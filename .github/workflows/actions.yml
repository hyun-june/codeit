name: Github Actions 연습하기

on:
  push:
    paths:
      - "lecture/**"

jobs:
  push-test:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5
        with:
          node-version: "24"

      - name: 의존성(라이브러리) 설치
        run: npm ci

      - name: 테스트 실행하기
        run: npm run test
